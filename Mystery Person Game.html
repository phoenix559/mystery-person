            padding: 0;

        }

        body {
            background-color: var(--page-bg);
            color: var(--midnight-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header Area */
        header {
            background-color: var(--midnight-bg);
            color: var(--midnight-text);
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--midnight-accent);
        }

        /* Main Identity Card */
        .card {
            background-color: var(--ocean-bg);
            color: var(--ocean-text);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Top Section: Image and Basic Info */
        .card-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid var(--ocean-accent);
            padding-bottom: 20px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--midnight-bg);
            background-color: var(--midnight-bg);
        }

        .basic-info h2 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .tag {
            background-color: var(--purple-bg);
            color: var(--purple-text);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .details-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .detail-item {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--midnight-bg);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* List Items */
        ul.detail-list {
            list-style-type: none;
        }
        ul.detail-list li::before {
            content: "• ";
            color: var(--midnight-bg);
            font-weight: bold;
        }

        /* Controls */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-next {
            background-color: var(--midnight-bg);
            color: var(--midnight-text);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-next:hover {
            background-color: var(--ocean-hover);
        }

        .btn-rules {
            background-color: var(--ocean-bg);
            color: var(--ocean-text);
            border: 2px solid var(--ocean-accent);
        }

        /* Instructions Banner */
        .instructions {
            background-color: var(--purple-bg);
            color: var(--purple-text);
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            text-align: center;
        }

    </style>

        let currentIndex = -1;

        // Utility: Calculate Age
        function calculateAge(dobString, isAlive) {
            const dob = new Date(dobString);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            return isAlive ? age : `${age} (Deceased)`;
        }

        // Utility: Generate Array into UL
        function createListHTML(arr) {
            if (!arr || arr.length === 0) return "None";
            return `<ul class="detail-list">` + arr.map(item => `<li>${item}</li>`).join('') + `</ul>`;
        }

        // Generate fallback avatar URL if no specific image is provided
        function getAvatarUrl(name) {
            // using midnight blue background and white text for fallback avatars
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=264457&color=ffffff&size=128&font-size=0.4&bold=true`;
        }

        function renderPerson(person) {
            const card = document.getElementById('personCard');
            const ageText = calculateAge(person.dob, person.isAlive);
            const statusTag = person.isAlive ? "Alive" : "Deceased";
            const marriageStatus = person.currentlyMarried ? `Yes (to ${person.currentSpouse})` : "No";
            const divorceStatus = person.isDivorced ? "Yes" : "No";
            const imageUrl = person.imageUrl || getAvatarUrl(person.name);

            // Generate Occupations Tags
            const occupationTags = person.occupations.map(job => `<span class="tag">${job}</span>`).join('');

            card.innerHTML = `
                <div class="card-header">
                    <img src="${imageUrl}" alt="${person.name}" class="profile-pic" onerror="this.src='${getAvatarUrl(person.name)}'">
                    <div class="basic-info">
                        <h2>${person.name}</h2>
                        <span class="tag bg-dark">${statusTag}</span>
                        <span class="tag">${person.nationality}</span>
                        <div style="margin-top: 10px;">${occupationTags}</div>
                    </div>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label">Gender</div>
                        <div class="detail-value">${person.gender}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Age</div>
                        <div class="detail-value">${ageText}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Famous Work / Team</div>
                        <div class="detail-value">${person.notableWork}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Birth Place (Origin)</div>
                        <div class="detail-value">${person.birthPlace}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Current Location</div>
                        <div class="detail-value">${person.currentLocation}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Married?</div>
                        <div class="detail-value">${marriageStatus}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Divorced?</div>
                        <div class="detail-value">${divorceStatus}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Famous Family & Friends</div>
                        <div class="detail-value">${createListHTML(person.famousFamilyOrFriends)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Former Spouses</div>
                        <div class="detail-value">${createListHTML(person.formerSpouses)}</div>
                    </div>
                </div>
            `;
        }

        function generateRandomPerson() {
            let nextIndex;
            // Prevent showing the exact same person twice in a row
            do {
                nextIndex = Math.floor(Math.random() * mysteryPeople.length);
            } while (nextIndex === currentIndex && mysteryPeople.length > 1);
            
            currentIndex = nextIndex;
            renderPerson(mysteryPeople[currentIndex]);
        }

        // Initialize App (Hardcode Shakira as the practice person)
        window.onload = () => {
            const shakiraIndex = mysteryPeople.findIndex(p => p.name === "Shakira");
            currentIndex = shakiraIndex !== -1 ? shakiraIndex : 0;
            renderPerson(mysteryPeople[currentIndex]);
        };

    </script>
